services:
  - type: web
    name: flask-db
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./db/start.sh && gunicorn
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flask-db-postgres
          property: connectionString

databases:
  - name: flask-db-postgres
    plan: free
