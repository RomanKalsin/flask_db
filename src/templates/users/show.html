{% extends "/layout.html" %}
{% block content %}
<div class="user-card">
    <dl>
        <dt>ID</dt>
        <dd>{{ user.id }}</dd>
        <dt>Имя</dt>
        <dd>{{ user.name }}</dd>
        <dt>Почта</dt>
        <dd>{{ user.email }}</dd>
    </dl>
</div>
<a href="{{ url_for('users.users_edit', id=user.id) }}" class="btn">Редактировать</a>
{% endblock %}
