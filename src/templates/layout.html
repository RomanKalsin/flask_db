<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask проект{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div id="sidebar">
    {% block sidebar %}
        <ul>
            <li><a href="{{ url_for('index.index') }}">Главная</a></li>
            <li><a href="{{ url_for('users.get_users') }}">Список пользователей</a></li>
        </ul>
    {% endblock %}
</div>
<div id="content">
    {% if messages %}
    <ul class=flashes>
    {% for category, message in messages %}
        <li class="{{ category }}">{{ message }}</li>
    {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
